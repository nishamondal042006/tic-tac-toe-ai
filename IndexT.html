<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="tic.css">
</head>
<body>
    <h1> Tic Tac Toe </h1>
    <div id="msgcont" class="hide">
        <p id="msg"> </p>
        <button id="new"> <b> NEW GAME </b></button>
    </div>
    <main>
        <div class="container">
            <div class="game">
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
            </div>
        </div>
        <p class="note"> Good Luck with the Game!</p>
        <div class="btn">
            <button id="reset"> <b>RESET GAME </b> </button> <button id="aimode"><b> AI-Mode </b></button>
        </div>
    </main>
    <script src="tic.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</body>
</html>
